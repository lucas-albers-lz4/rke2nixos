# Age recipients — replace with your keys before encrypting secrets.
# Generate: age-keygen -o ~/.config/sops/age/keys.txt
# Then put the public key below and run:
#   sops secrets/rke2-token.enc.yaml
keys:
  - &admin age1replace_with_your_age_public_key_here

creation_rules:
  - path_regex: secrets/[^/]+\.(yaml|yml|json|env)$
    key_groups:
      - age:
          - *admin

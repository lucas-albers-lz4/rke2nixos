name: ci

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  eval-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v12

      - name: Check flake.lock pin discipline
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            ./scripts/check-flake-lock-pins.sh "origin/${{ github.base_ref }}"
          else
            ./scripts/check-flake-lock-pins.sh origin/master
          fi

      - name: Flake show
        run: nix flake show

      - name: Build example-server0 toplevel
        run: nix build .#packages.x86_64-linux.example-server0 --print-build-logs

      - name: Upload example-server0
        uses: actions/upload-artifact@v4
        with:
          name: example-server0-toplevel
          path: result
          if-no-files-found: error

      - name: Build example-agent0 toplevel
        run: nix build .#packages.x86_64-linux.example-agent0 --out-link result-agent --print-build-logs

      - name: Upload example-agent0
        uses: actions/upload-artifact@v4
        with:
          name: example-agent0-toplevel
          path: result-agent
          if-no-files-found: error

      - name: Build proxmox-server0 qcow2
        run: nix build .#packages.x86_64-linux.proxmox-server0-qcow2 --out-link result-server-qcow --print-build-logs

      - name: Compress proxmox-server0 qcow2
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq zstd
          mkdir -p artifact-qcow
          zstd -T0 -19 -o artifact-qcow/proxmox-server0.qcow2.zst result-server-qcow/*.qcow2

      - name: Upload proxmox-server0-qcow2
        uses: actions/upload-artifact@v4
        with:
          name: proxmox-server0-qcow2-zst
          path: artifact-qcow
          if-no-files-found: error

      - name: Build installer ISO
        run: nix build .#packages.x86_64-linux.installer-iso --out-link result-iso --print-build-logs

      - name: Compress installer ISO
        run: |
          mkdir -p artifact-iso
          zstd -T0 -19 -o artifact-iso/installer.iso.zst result-iso/iso/*.iso

      - name: Upload installer-iso
        uses: actions/upload-artifact@v4
        with:
          name: installer-iso-zst
          path: artifact-iso
          if-no-files-found: error
